apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: goormthon-6 #FIXME:

resources:
  - backend.yaml
  - ingress.yaml

images:
  - name: backend
    newName: your-account-id.dkr.ecr.ap-northeast-2.amazonaws.com/goormthon-6/backend
    newTag: latest

configMapGenerator:
  - name: backend-config
    files:
      - config.json=config/backend-config.json

generatorOptions:
  disableNameSuffixHash: true