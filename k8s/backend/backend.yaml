apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1 #FIXME: replica 수 조정
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
      - name: prisma-db-push
        image: 837126493345.dkr.ecr.ap-northeast-2.amazonaws.com/goormthon-6/backend:build-12
        command:
        - sh
        - -c
        - |
          set -eu
          echo "[init] prisma db push start"
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "[init] DATABASE_URL is missing"
          fi
          retry=0
          until bunx prisma db push; do
            retry=$((retry + 1))
            echo "[init] prisma db push failed, retry ${retry} in 5s"
            sleep 5
          done
          echo "[init] prisma db push success"
        env:
        - name: PORT
          value: "8080"
        envFrom:
        - secretRef:
            name: app-db-secret
      containers:
      - name: backend
        image: 837126493345.dkr.ecr.ap-northeast-2.amazonaws.com/goormthon-6/backend:build-12
        env:
        - name: PORT
          value: "8080"
        envFrom:
        - secretRef:
            name: app-db-secret
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: config-volume
        configMap:
          name: backend-config
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
  - port: 80
    targetPort: 8080
